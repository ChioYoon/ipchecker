name: IP 감수 허브 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = KST 09:00 매일 자동 실행
  workflow_dispatch:        # GitHub 웹에서 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # living_guideline.json 커밋 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Trello 동기화
        env:
          TRELLO_API_KEY:  ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN:    ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
        run: python scripts/trello_fetch.py

      - name: 데이터 파싱
        run: python scripts/trello_parser.py

      - name: AI 요약 갱신 (실패해도 배포 계속)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/summarizer.py
        continue-on-error: true

      - name: 뷰어용 데이터 복사
        run: |
          cp data/living_guideline.json living_guideline.json
          cp data/notebooklm_source.md  notebooklm_source.md 2>/dev/null || true

      - name: 변경사항 커밋 & 배포
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/living_guideline.json living_guideline.json notebooklm_source.md
          git diff --cached --quiet || git commit -m "auto-update: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
