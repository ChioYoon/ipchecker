<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도원암귀: Crimson Inferno — IP 감수 허브</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .col-scroll { overflow-y: auto; height: calc(100vh - 140px); }
    .border-rejection { border-left-color: #DC2626; }
    .border-approved  { border-left-color: #16A34A; }
    .border-pending   { border-left-color: #2563EB; }
    .cat-영상   { background:#FEE2E2; color:#991B1B; }
    .cat-배너   { background:#DBEAFE; color:#1E40AF; }
    .cat-SNS    { background:#F3E8FF; color:#6B21A8; }
    .cat-이미지 { background:#D1FAE5; color:#065F46; }
    .cat-기획안 { background:#FEF9C3; color:#854D0E; }
    .cat-텍스트 { background:#FFE4E6; color:#9F1239; }
    .cat-굿즈   { background:#E0F2FE; color:#075985; }
    .cat-기타   { background:#F3F4F6; color:#374151; }
    .filter-active { background:#1E293B!important; color:#fff!important; }
    .tab-active { border-bottom:2px solid #DC2626; color:#DC2626; font-weight:700; }
    details > summary { list-style:none; }
    details > summary::-webkit-details-marker { display:none; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

<!-- ── 헤더 ─────────────────────────────────────────── -->
<header class="bg-gradient-to-r from-slate-900 via-red-950 to-slate-900 text-white px-5 py-3 shadow-lg">
  <div class="max-w-screen-2xl mx-auto flex items-center justify-between">
    <div>
      <h1 class="text-lg font-bold tracking-tight">🛡️ 도원암귀: Crimson Inferno</h1>
      <p class="text-xs text-slate-400 mt-0.5">IP 감수 인텔리전스 허브</p>
    </div>
    <div class="flex items-center gap-3 text-xs">
      <span class="px-2.5 py-1 bg-slate-700 text-slate-300 rounded-full text-xs">팀 공유 — 읽기 전용</span>
      <span id="data-freshness" class="text-slate-400"></span>
    </div>
  </div>
</header>

<!-- ── 통계 바 ────────────────────────────────────────── -->
<div class="bg-slate-800 px-5 py-1.5">
  <div class="max-w-screen-2xl mx-auto flex items-center gap-3 text-xs">
    <span class="text-slate-400">현황</span>
    <span id="stat-total"    class="px-2 py-0.5 rounded-full bg-slate-600 text-white">—</span>
    <span id="stat-licensor" class="px-2 py-0.5 rounded-full bg-red-800 text-red-100">판권사 —</span>
    <span id="stat-reject"   class="px-2 py-0.5 rounded-full bg-red-700 text-white">반려 —</span>
    <span id="stat-pending"  class="px-2 py-0.5 rounded-full bg-blue-700 text-white">진행중 —</span>
    <span id="stat-approved" class="px-2 py-0.5 rounded-full bg-green-700 text-white">승인 —</span>
    <span id="summary-badge" class="hidden ml-2 px-2 py-0.5 rounded-full bg-blue-900 text-blue-200">AI 요약 있음</span>
    <span id="last-updated" class="ml-auto text-slate-500"></span>
  </div>
</div>

<!-- ── 2단 메인 레이아웃 ──────────────────────────────── -->
<div class="max-w-screen-2xl mx-auto p-3 grid grid-cols-12 gap-3">

  <!-- 좌측: IP 규칙 참조 (3칸) -->
  <aside class="col-span-3 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col">
    <div class="px-4 py-3 border-b border-gray-100">
      <h2 class="text-sm font-semibold text-gray-800">📖 IP 규칙 빠른 참조</h2>
      <p class="text-xs text-gray-400 mt-0.5">계약 범위 & 캐릭터 가이드</p>
    </div>
    <!-- 섹션 이동 드롭박스 -->
    <div id="rule-nav" class="hidden px-3 py-2 border-b border-gray-100">
      <select id="rule-select" onchange="scrollToRuleSection(this.value)"
        class="w-full text-xs px-2 py-1.5 border border-gray-200 rounded bg-white focus:outline-none focus:ring-1 focus:ring-red-400 text-gray-600">
        <option value="">── 섹션으로 이동 ──</option>
      </select>
    </div>
    <div id="ip-rules-container" class="col-scroll p-3 space-y-2 text-xs text-gray-600 leading-relaxed">
      <p class="text-gray-400">IP 규칙 로딩 중...</p>
    </div>
  </aside>

  <!-- 우측: 통합 감수 현황 (9칸) -->
  <section class="col-span-9 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col">
    <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
      <div>
        <h2 class="text-sm font-semibold text-gray-800">📋 통합 감수 현황</h2>
        <p class="text-xs text-gray-400 mt-0.5">반려·판권사 이슈 우선 정렬 — AI 요약 포함</p>
      </div>
      <div class="flex items-center gap-2">
        <span id="filtered-count" class="text-xs text-gray-400"></span>
        <input id="trello-search" type="text" placeholder="🔍 검색..."
          oninput="applyFilters()"
          class="text-xs px-2.5 py-1.5 border border-gray-200 rounded w-36 focus:outline-none focus:ring-1 focus:ring-red-400">
      </div>
    </div>
    <!-- 상태 탭 -->
    <div class="flex border-b border-gray-100 px-3 pt-1.5 gap-0.5 text-xs">
      <button class="status-tab tab-active px-2.5 py-1.5" data-status="전체"   onclick="setStatusTab(this)">전체</button>
      <button class="status-tab px-2.5 py-1.5 text-gray-500" data-status="진행중" onclick="setStatusTab(this)" title="판권사에 감수 요청 후 결과 대기 중">진행 중</button>
      <button class="status-tab px-2.5 py-1.5 text-gray-500" data-status="반려"   onclick="setStatusTab(this)" title="판권사 수정 요구 또는 반려 처분">반려</button>
      <button class="status-tab px-2.5 py-1.5 text-gray-500" data-status="승인"   onclick="setStatusTab(this)" title="판권사 최종 승인 완료">승인</button>
    </div>
    <!-- 카테고리 필터 -->
    <div class="px-3 py-2 border-b border-gray-100 flex flex-wrap gap-1">
      <button class="cat-btn filter-active text-xs px-2 py-0.5 rounded-full" data-cat="전체"   onclick="setCatFilter(this)">전체</button>
      <button class="cat-btn text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" data-cat="영상"   onclick="setCatFilter(this)">영상</button>
      <button class="cat-btn text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" data-cat="배너"   onclick="setCatFilter(this)">배너</button>
      <button class="cat-btn text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" data-cat="SNS"    onclick="setCatFilter(this)">SNS</button>
      <button class="cat-btn text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" data-cat="이미지" onclick="setCatFilter(this)">이미지</button>
      <button class="cat-btn text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" data-cat="기획안" onclick="setCatFilter(this)">기획안</button>
      <button class="cat-btn text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" data-cat="텍스트" onclick="setCatFilter(this)">텍스트</button>
      <button class="cat-btn text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" data-cat="굿즈"   onclick="setCatFilter(this)">굿즈</button>
    </div>
    <!-- 날짜 필터 -->
    <div class="px-3 py-2 border-b border-gray-100 flex items-center gap-2 flex-wrap text-xs">
      <span class="text-gray-400 shrink-0">기간</span>
      <button class="date-btn filter-active px-2 py-0.5 rounded-full" data-days="30" onclick="setDateFilter(this)">최근 1개월</button>
      <button class="date-btn px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" data-days="7"  onclick="setDateFilter(this)">최근 1주</button>
      <button class="date-btn px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" data-days="90" onclick="setDateFilter(this)">최근 3개월</button>
      <button class="date-btn px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" data-days="0"  onclick="setDateFilter(this)">전체</button>
      <div class="flex items-center gap-1 ml-1">
        <input type="date" id="date-from" oninput="onDateInput()"
          class="text-xs px-1.5 py-0.5 border border-gray-200 rounded focus:outline-none focus:ring-1 focus:ring-red-400">
        <span class="text-gray-400">~</span>
        <input type="date" id="date-to" oninput="onDateInput()"
          class="text-xs px-1.5 py-0.5 border border-gray-200 rounded focus:outline-none focus:ring-1 focus:ring-red-400">
      </div>
      <span id="date-range-label" class="text-gray-400 ml-1"></span>
    </div>
    <!-- 카드 목록 (2열 그리드) -->
    <div id="card-list" class="col-scroll p-3 overflow-y-auto">
      <p class="text-gray-400 text-xs text-center py-8">데이터 로드 중...</p>
    </div>
  </section>

</div>

<script>
// ── 전역 상태 ────────────────────────────────────────────
let allGuidelines  = [];
let activeStatus   = '전체';
let activeCategory = '전체';
let activeDateDays = 30;

// ── 초기화 ───────────────────────────────────────────────
window.onload = async () => {
  await Promise.all([loadRules(), loadGuidelines()]);
};

// ── IP 규칙 패널 ─────────────────────────────────────────
async function loadRules() {
  try {
    const res = await fetch('./CLAUDE.md');
    if (!res.ok) return;
    renderIPRules(await res.text());
  } catch {}
}

function mdLine(line) {
  return line
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g,       '<code class="bg-gray-100 px-0.5 rounded font-mono text-xs">$1</code>')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '<span class="text-blue-600 underline">$1</span>');
}

function scrollToRuleSection(id) {
  if (!id) return;
  const container = document.getElementById('ip-rules-container');
  const el = document.getElementById(id);
  if (el && container) container.scrollTop = el.offsetTop - container.offsetTop - 4;
  document.getElementById('rule-select').value = '';
}

function renderIPRules(md) {
  const container = document.getElementById('ip-rules-container');
  const lines = md.split('\n');
  let html = '';
  let inTable = false;
  const sections = [];

  for (const rawLine of lines) {
    const line = rawLine.trimEnd();
    if (line.startsWith('## ')) {
      inTable = false;
      const secTitle = line.slice(3);
      const secId = `rule-sec-${sections.length}`;
      sections.push({ id: secId, title: secTitle });
      html += `<div id="${secId}" class="mt-3 mb-1 pt-2 border-t border-red-100">
        <span class="text-xs font-bold text-red-800">${mdLine(escHtml(secTitle))}</span></div>`;
    } else if (line.startsWith('### ')) {
      inTable = false;
      html += `<div class="mt-2 mb-0.5"><span class="text-xs font-semibold text-gray-700">${mdLine(escHtml(line.slice(4)))}</span></div>`;
    } else if (line.startsWith('> ')) {
      html += `<div class="text-xs text-gray-400 italic pl-2 border-l-2 border-gray-200 mb-1">${mdLine(escHtml(line.slice(2)))}</div>`;
    } else if (line.startsWith('- ')) {
      const content = line.slice(2);
      const isBan = content.includes('금지') || content.includes('절대') || content.includes('불가');
      html += `<div class="flex gap-1 items-start text-xs pl-1 mb-0.5">
        <span class="${isBan ? 'text-red-500' : 'text-gray-400'} shrink-0 mt-0.5">${isBan ? '⛔' : '•'}</span>
        <span class="${isBan ? 'text-red-800 font-medium' : 'text-gray-600'}">${mdLine(escHtml(content))}</span></div>`;
    } else if (line.startsWith('|')) {
      const cells = line.slice(1, -1).split('|').map(c => c.trim());
      if (cells.every(c => /^[-:]+$/.test(c))) continue;
      if (!inTable) { html += '<div class="mt-1 mb-1 text-xs border border-gray-200 rounded overflow-hidden">'; inTable = true; }
      const isHeader = !html.includes('<div class="flex bg-gray-50');
      const cls = isHeader ? 'bg-gray-50 font-semibold text-gray-700' : 'text-gray-600 border-t border-gray-100';
      html += `<div class="flex ${cls}">${cells.map(c => `<div class="flex-1 px-1.5 py-1">${mdLine(escHtml(c))}</div>`).join('')}</div>`;
      continue;
    } else if (line === '---') {
      inTable = false; html += '<hr class="border-gray-200 my-2">';
    } else if (line === '') {
      inTable = false; html += '<div class="h-0.5"></div>';
    } else {
      inTable = false;
      if (line.trim()) html += `<div class="text-xs text-gray-600 mb-0.5">${mdLine(escHtml(line))}</div>`;
    }
    if (inTable && !line.startsWith('|')) { html += '</div>'; inTable = false; }
  }
  if (inTable) html += '</div>';

  const sel = document.getElementById('rule-select');
  const nav = document.getElementById('rule-nav');
  if (sections.length) {
    sel.innerHTML = '<option value="">── 섹션으로 이동 ──</option>' +
      sections.map(s => `<option value="${s.id}">${escHtml(s.title)}</option>`).join('');
    nav.classList.remove('hidden');
  }
  container.innerHTML = html || '<p class="text-gray-400 text-xs">IP 규칙을 불러올 수 없습니다.</p>';
}

// ── 가이드라인 로드 ──────────────────────────────────────
async function loadGuidelines() {
  try {
    const res = await fetch('./living_guideline.json');
    if (!res.ok) throw new Error();
    allGuidelines = await res.json();
    updateStats();
    applyFilters();
    updateDataFreshness();
  } catch {
    document.getElementById('card-list').innerHTML =
      '<p class="text-gray-400 text-xs text-center py-8">데이터를 불러올 수 없습니다.</p>';
  }
}

function updateDataFreshness() {
  const dates = allGuidelines.map(g => g.last_activity || '').filter(Boolean).sort();
  if (!dates.length) return;
  const latest = new Date(dates[dates.length - 1]);
  const fmt = latest.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('data-freshness').textContent = `최종 동기화: ${fmt}`;
}

function updateStats() {
  const total      = allGuidelines.length;
  const lic        = allGuidelines.filter(g => g.licensor_feedbacks?.length > 0).length;
  const rej        = allGuidelines.filter(g => g.status === '반려').length;
  const pen        = allGuidelines.filter(g => g.status === '진행중').length;
  const app        = allGuidelines.filter(g => g.status === '승인').length;
  const hasSummary = allGuidelines.some(g => g.ai_summary);

  document.getElementById('stat-total').textContent    = `전체 ${total}건`;
  document.getElementById('stat-licensor').textContent = `판권사 ${lic}건`;
  document.getElementById('stat-reject').textContent   = `반려 ${rej}건`;
  document.getElementById('stat-pending').textContent  = `진행중 ${pen}건`;
  document.getElementById('stat-approved').textContent = `승인 ${app}건`;
  document.getElementById('summary-badge').classList.toggle('hidden', !hasSummary);
  document.getElementById('last-updated').textContent  = `${new Date().toLocaleTimeString('ko-KR')} 기준`;
}

// ── 날짜 필터 ────────────────────────────────────────────
function setDateFilter(btn) {
  document.querySelectorAll('.date-btn').forEach(b => {
    b.classList.remove('filter-active');
    b.classList.add('bg-gray-100', 'text-gray-600');
  });
  btn.classList.add('filter-active');
  btn.classList.remove('bg-gray-100', 'text-gray-600');
  activeDateDays = parseInt(btn.dataset.days);
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value   = '';
  applyFilters();
}

function onDateInput() {
  document.querySelectorAll('.date-btn').forEach(b => {
    b.classList.remove('filter-active');
    b.classList.add('bg-gray-100', 'text-gray-600');
  });
  activeDateDays = -1;
  applyFilters();
}

// ── 필터 & 정렬 ──────────────────────────────────────────
function applyFilters() {
  const keyword  = (document.getElementById('trello-search').value || '').toLowerCase();
  const dateFrom = document.getElementById('date-from').value;
  const dateTo   = document.getElementById('date-to').value;
  const now      = new Date();

  let cutoffISO = '';
  if (activeDateDays > 0) {
    cutoffISO = new Date(now.getTime() - activeDateDays * 86400000).toISOString();
  }

  let filtered = allGuidelines.filter(item => {
    if (activeStatus !== '전체' && item.status !== activeStatus) return false;
    if (activeCategory !== '전체' && item.category !== activeCategory) return false;
    if (keyword) {
      const h = ((item.subject || '') + (item.asset_type || '') + (item.description || '')).toLowerCase();
      if (!h.includes(keyword)) return false;
    }
    const itemDate = item.latest_comment_date || item.last_activity || '';
    if (dateFrom || dateTo) {
      const d = itemDate.slice(0, 10);
      if (dateFrom && d && d < dateFrom) return false;
      if (dateTo   && d && d > dateTo)   return false;
    } else if (cutoffISO && itemDate) {
      if (itemDate < cutoffISO) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    const aDate = a.latest_comment_date || a.last_activity || '';
    const bDate = b.latest_comment_date || b.last_activity || '';
    return bDate.localeCompare(aDate);
  });

  const label = document.getElementById('date-range-label');
  label.textContent = filtered.length < allGuidelines.length
    ? `(전체 ${allGuidelines.length}건 중 ${filtered.length}건)` : '';

  document.getElementById('filtered-count').textContent = `${filtered.length}건`;
  renderCards(filtered);
}

function setStatusTab(btn) {
  document.querySelectorAll('.status-tab').forEach(b => b.classList.remove('tab-active'));
  btn.classList.add('tab-active');
  activeStatus = btn.dataset.status;
  applyFilters();
}

function setCatFilter(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('filter-active'));
  btn.classList.add('filter-active');
  activeCategory = btn.dataset.cat;
  applyFilters();
}

// ── 카드 렌더링 ──────────────────────────────────────────
function renderCards(items) {
  const c = document.getElementById('card-list');
  if (!items.length) {
    c.innerHTML = '<p class="text-gray-400 text-xs text-center py-8">해당 조건의 카드 없음</p>';
    return;
  }
  c.innerHTML = `<div class="grid grid-cols-2 gap-2">${items.map(buildCard).join('')}</div>`;
}

function buildCard(item) {
  const borderCls  = item.status === '반려' ? 'border-rejection' : item.status === '진행중' ? 'border-pending' : 'border-approved';
  const hasLic     = item.licensor_feedbacks?.length > 0;
  const hasSummary = !!item.ai_summary;
  const cardUrl    = item.card_url || '';

  const tags = [
    item.asset_type
      ? `<span class="text-xs bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">${escHtml(item.asset_type.slice(0, 15))}</span>`
      : '',
    ...extractPurposeKeywords(item.purpose).map(k =>
      `<span class="text-xs bg-amber-50 text-amber-700 px-1.5 py-0.5 rounded" title="${escHtml((item.purpose || '').split('\n')[0])}">${escHtml(k)}</span>`
    ),
  ].filter(Boolean).join('');

  let licHtml = '';
  if (hasLic) {
    if (hasSummary) {
      const s = item.ai_summary;
      const resolved  = s.resolved;
      const needsUpd  = s.needs_update;
      licHtml = `<div class="mt-1.5 ${resolved ? 'bg-green-50 border-green-300' : 'bg-red-50 border-red-300'} border-l-2 px-2 py-1.5 rounded-r">
        <p class="text-xs font-bold ${resolved ? 'text-green-700' : 'text-red-700'} mb-0.5 flex items-center gap-1.5 flex-wrap">
          ${resolved ? '✅' : '⚠️'} 감수 요약
          ${needsUpd ? `<span class="bg-orange-500 text-white text-xs px-1.5 py-0.5 rounded font-normal" title="${escHtml(s.update_reason || '변경 감지됨')}">갱신 필요</span>` : ''}
        </p>
        <p class="text-xs font-semibold ${resolved ? 'text-green-800' : 'text-red-800'} mb-0.5">${escHtml(s.issue || '')}</p>
        ${toKoreanBullets(s.detail || '')}
      </div>`;
    } else {
      const firstFb = item.licensor_feedbacks[0] || '';
      licHtml = `<div class="mt-1.5 bg-red-50 border-l-2 border-red-400 px-2 py-1.5 rounded-r">
        <p class="text-xs font-bold text-red-700 mb-0.5">판권사 피드백 ${item.licensor_feedbacks.length}건 <span class="font-normal text-gray-400">(요약 미생성)</span></p>
        <p class="text-xs text-red-800 leading-relaxed">${escHtml(firstFb.slice(0, 100))}${firstFb.length > 100 ? '…' : ''}</p>
      </div>`;
    }
  }

  const fbHtml = item.feedbacks?.length ? `
    <details class="mt-1">
      <summary class="text-xs text-gray-400 cursor-pointer hover:text-gray-600">💬 전체 댓글 ${item.feedbacks.length}건</summary>
      <ul class="mt-1 space-y-0.5 pl-2 border-l border-gray-200">
        ${item.feedbacks.slice(0, 4).map(f =>
          `<li class="text-xs text-gray-500">${escHtml(f.slice(0, 100))}${f.length > 100 ? '…' : ''}</li>`
        ).join('')}
      </ul>
    </details>` : '';

  const linkHtml = cardUrl
    ? `<a href="${escHtml(cardUrl)}" target="_blank"
        class="text-xs text-blue-500 hover:text-blue-700 hover:underline shrink-0"
        title="Trello 카드 열기">↗</a>`
    : '';

  return `<div class="p-2.5 bg-gray-50 border-l-4 ${borderCls} rounded-r-lg text-xs">
    <div class="flex items-start justify-between gap-1 mb-1">
      <p class="font-semibold text-gray-800 leading-snug flex-1">${escHtml(item.subject)}</p>
      <div class="flex items-center gap-1 shrink-0">
        <span class="cat-${item.category || '기타'} text-xs px-1.5 py-0.5 rounded font-medium">${item.category || '기타'}</span>
        ${hasLic ? '<span class="bg-red-600 text-white text-xs px-1.5 py-0.5 rounded font-bold" title="판권사(리모우) 피드백 댓글이 있는 카드">판권사</span>' : ''}
        ${linkHtml}
      </div>
    </div>
    ${tags ? `<div class="flex flex-wrap gap-1 mb-1">${tags}</div>` : ''}
    ${licHtml}${fbHtml}
  </div>`;
}

// ── 사용 용도 키워드 추출 ────────────────────────────────
const PURPOSE_PATTERNS = [
  { re: /도쿄게임쇼|\bTGS\b/i,                          label: 'TGS' },
  { re: /\bAJ\b|anime\s*japan/i,                         label: 'AJ' },
  { re: /\bAGF\b/i,                                      label: 'AGF' },
  { re: /\bX\b|트위터|twitter/i,                         label: 'X' },
  { re: /유튜브|youtube|\bYT\b/i,                        label: '유튜브' },
  { re: /인스타|instagram/i,                             label: '인스타' },
  { re: /웹이벤트/,                                      label: '웹이벤트' },
  { re: /인게임|in.?game/i,                              label: '인게임' },
  { re: /\bLED\b/i,                                      label: 'LED' },
  { re: /\bUA\b/,                                        label: 'UA' },
  { re: /스팀|\bsteam\b/i,                               label: 'Steam' },
  { re: /하이브|\bhive\b/i,                              label: '하이브' },
  { re: /네이버라운지|naver/i,                           label: '네이버' },
  { re: /마켓|앱스토어|구글플레이|app.?store/i,         label: '마켓' },
  { re: /사전.?예약/,                                    label: '사전예약' },
  { re: /PR.?배포|배포용/,                               label: 'PR배포' },
  { re: /미니사이트|브랜드사이트|공식사이트/,            label: '사이트' },
  { re: /쿠폰|coupon/i,                                  label: '쿠폰' },
  { re: /푸시|push/i,                                    label: '푸시' },
  { re: /보도자료|press/i,                               label: '보도자료' },
  { re: /이벤트|event/i,                                 label: '이벤트' },
];

function extractPurposeKeywords(purpose) {
  if (!purpose) return [];
  const text = purpose.split('\n')[0].trim();
  const found = [];
  for (const { re, label } of PURPOSE_PATTERNS) {
    if (re.test(text) && !found.includes(label)) {
      found.push(label);
      if (found.length >= 3) break;
    }
  }
  if (!found.length) {
    const words = text.split(/[\s,\/]+/).filter(w => w.length > 1).slice(0, 2);
    found.push(...words);
  }
  return found;
}

function toKoreanBullets(text) {
  if (!text) return '';
  const raw = text.split(/\.\s+|\n+/).map(s => s.trim()).filter(Boolean);
  const sentences = raw.map((s, i) => i < raw.length - 1 ? s + '.' : s);
  if (sentences.length <= 1) return `<p class="text-xs text-gray-600 leading-relaxed">${escHtml(text)}</p>`;
  return `<ul class="mt-0.5 space-y-0.5">${sentences.map(s =>
    `<li class="text-xs text-gray-600 leading-relaxed flex gap-1.5"><span class="text-gray-400 shrink-0 mt-0.5">•</span><span>${escHtml(s)}</span></li>`
  ).join('')}</ul>`;
}

function escHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
